name: Update & Deploy Recipes

on:
  schedule:
    - cron: '0 21 * * *'   # 毎朝JST 6:00に自動実行
  workflow_dispatch:         # 手動実行ボタンも有効化

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 anthropic

      - name: Run scraper & translator
        run: python recipe_scraper.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          RAKUTEN_TAG: ${{ secrets.RAKUTEN_TAG }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
```

**Commit changes** で保存。

---

### STEP 6：GitHub Pagesを有効化

リポジトリの **Settings → Pages**：
- Source: `Deploy from a branch`
- Branch: `gh-pages` / `/ (root)`
- **Save**

---

### STEP 7：初回を手動実行

**Actions タブ → Update & Deploy Recipes → Run workflow** で今すぐ実行。

数分後に以下のURLでサイトが公開されます：
```
https://あなたのGitHubユーザー名.github.io/japanese-kitchen/
```

---

### 独自ドメインを使いたい場合（オプション）

お名前.com や Cloudflare でドメインを取得後、GitHub Pages の **Custom domain** に入力するだけです。`www.japanesekitchen.com` のような形にできます。

---

### 全体の流れ（完成後）
```
毎朝6:00
  ↓ GitHub Actionsが自動起動
  ↓ recipe_scraper.py 実行
  ↓ 新規レシピを取得・翻訳
  ↓ output/index.html を更新
  ↓ gh-pages ブランチに自動デプロイ
  ↓ サイトが最新状態に
